<html>
<head>
    <script type="text/javascript" src="cordova.js"></script>
    <script src="scripts/vuejs.js"></script>
    <script src="scripts/vuex.js"></script>
    <script src="scripts/jquery-3.3.1.js"></script>
    <script src="scripts/listener.js"></script>
    <script src="scripts/database.js"></script>
    <script src="scripts/login.js"></script>
    <script src="scripts/axiosjs.js"></script>


    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        form {
            border: 3px solid #f1f1f1;
        }

        input[type=text], input[type=password] {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        #btnCreate {
            background-color: #ff6a00;
        }

        #btnUpdate {
            background-color: #2196F3;
        }

        button:hover {
            opacity: 0.8;
        }

        /* Güncelleme Bölümü */
        .update-section {
            padding: 10px 16px;
            display: none;
        }
        .update-section.active {
            display: block;
        }
        .progress-container {
            width: 100%;
            background-color: #ddd;
            border-radius: 8px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 30px;
            background-color: #4CAF50;
            text-align: center;
            line-height: 30px;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: width 0.3s;
        }
        .update-status {
            font-size: 14px;
            color: #333;
            margin-top: 5px;
            text-align: center;
        }
        .update-success {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
        }
        .update-error {
            color: #f44336;
            font-weight: bold;
        }

        .cancelbtn {
            width: auto;
            padding: 10px 18px;
            background-color: #f44336;
        }

        .imgcontainer {
            text-align: center;
            margin: 24px 0 12px 0;
        }

        img.avatar {
            width: 40%;
            border-radius: 50%;
        }

        .container {
            padding: 16px;
        }

        span.psw {
            float: right;
            padding-top: 16px;
        }

        /* Change styles for span and cancel button on extra small screens */
        @media screen and (max-width: 300px) {
            span.psw {
                display: block;
                float: none;
            }

            .cancelbtn {
                width: 100%;
            }
        }
    </style>
    <script>
        $(document).ready(function () {
            updateConnectionProperties();
            window.history.forward(1);
            window.history.pushState(null, "", window.location.href);
            window.onpopstate = function () {
                window.history.pushState(null, "", window.location.href);
            };
        })
    </script>

</head>
<body>
    <div id="login" v-cloak>
        <h2>DIYALOG RESEARCH SURVEY SYSTEM</h2>
        <div id="divLabel"></div>
        <form>

            <button type="button" id="btnUpdate" name="btnUpdate" @click="checkForUpdate()">
                Güncelleme Kontrol Et
            </button>

            <!-- Güncelleme Progress Bölümü -->
            <div class="update-section" :class="{ active: updateVisible }">
                <div class="progress-container">
                    <div class="progress-bar" :style="{ width: updateProgress + '%' }">
                        %{{ updateProgress }}
                    </div>
                </div>
                <div class="update-status" :class="{ 'update-success': updateDone, 'update-error': updateError }">
                    {{ updateMessage }}
                </div>
            </div>

            <button type="button" id="btnCreate" name="btnCreate" @click="KullaniciYukle()">
                Kullanıcıları Yükle
            </button>
            <div class="container">
                <label for="uname"><b>Username</b></label>
                <input type="text" placeholder="Enter Username" name="uname" id="uname" v-model="uname" required>

                <label for="psw"><b>Password</b></label>
                <input type="password" placeholder="Enter Password" name="psw" id="psw" v-model="psw" required>

                <button type="button" id="btnLogin" @click="loginClick">Login</button>

            </div>

            <div class="container" style="background-color:#f1f1f1">
                <span style="font-size:8PX" id="version"> </span>
                <span @click="adminTap()" style="float:right; font-size:10px; color:#888; cursor:pointer; user-select:none;">v{{ appVersion }}</span>
            </div>
           Yüklenme: <span style="font-size:38PX;color:red" id="spanOran">%{{oran}} </span>
        </form>

        <!-- Gizli Yönetici Paneli -->
        <div v-if="adminVisible" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:center; justify-content:center;">
            <div style="background:white; border-radius:12px; padding:25px; width:85%; max-width:400px; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
                <h3 style="margin:0 0 15px 0; color:#333; text-align:center;">🔒 Yönetici Paneli</h3>
                
                <div v-if="!adminAuth" style="text-align:center;">
                    <input type="password" v-model="adminPass" placeholder="Yönetici Şifresi" 
                        style="width:90%; padding:10px; margin:10px 0; border:2px solid #ddd; border-radius:6px; font-size:16px;">
                    <br>
                    <button @click="adminLogin()" type="button" 
                        style="background:#2196F3; color:white; border:none; padding:12px 30px; border-radius:6px; font-size:14px; margin:5px;">
                        Giriş
                    </button>
                    <button @click="adminVisible=false; adminPass=''" type="button" 
                        style="background:#999; color:white; border:none; padding:12px 30px; border-radius:6px; font-size:14px; margin:5px;">
                        İptal
                    </button>
                </div>

                <div v-if="adminAuth">
                    <div style="margin:10px 0; padding:10px; background:#f5f5f5; border-radius:6px; font-size:13px;">
                        <b>Kiosk Durumu:</b> <span :style="{color: kioskActive ? '#4CAF50' : '#f44336'}">{{ kioskActive ? 'AKTİF' : 'KAPALI' }}</span>
                    </div>

                    <button @click="toggleKiosk()" type="button" 
                        :style="{background: kioskActive ? '#f44336' : '#4CAF50', color:'white', border:'none', padding:'12px', borderRadius:'6px', width:'100%', fontSize:'14px', margin:'5px 0', fontWeight:'bold'}">
                        {{ kioskActive ? '🔓 Kiosk Modunu KAPAT' : '🔒 Kiosk Modunu AÇ' }}
                    </button>

                    <button @click="adminVisible=false; adminAuth=false; adminPass=''; tapCount=0;" type="button" 
                        style="background:#999; color:white; border:none; padding:12px; border-radius:6px; width:100%; font-size:14px; margin:10px 0 0 0;">
                        Kapat
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

<style>
    [v-cloak] { display: none; }
  </style>
  
</html>
